image: python:latest

# Change pip's cache directory to be inside the project directory since we can
# only cache local items.
variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

# https://pip.pypa.io/en/stable/topics/caching/
cache:
  paths:
    - .cache/pip

before_script:
  - python --version ; pip --version
  - curl -L https://github.com/pyenv/pyenv-installer/raw/master/bin/pyenv-installer | bash
  - export PATH="$HOME/.pyenv/bin:$PATH"
  - export PYENV_ROOT="$HOME/.pyenv"
  - pip install -U pipenv

check-version-number-bump:
  inherit:
    default: false
  stage: .pre
  image: debian:latest
  script:
    - apt update && apt upgrade
    - apt install -y git
    - echo Checking that version number has been bumped.
    - echo this check might not be suitable for your use case as is and it is
    - echo adviced to revise this check for your use case.
    - git diff HEAD^ HEAD | grep -oP '(?<=__version__ = ")[^"]*'
  rules:
    - if: $CI_OPEN_MERGE_REQUESTS

build-job:
  stage: build
  script:
    - pip install --upgrade pip
    - pip install --group build-tools
    - python -m build -sw
  artifacts:
    paths:
      - build/*
      - dist/*

test-pytest:
  stage: test
  script:
    - pipenv install --dev 
    - CI=true pipenv run pytest | tee test-report.txt
  artifacts:
    paths:
      - test-report.txt

test-multi-python:
  stage: test
  script:
    - pyenv install 3.9
    - pyenv install 3.10
    - pyenv install 3.11
    - pipenv install --dev 
    - CI=true pipenv run test | tee tox-report.txt
  artifacts:
    paths:
      - tox-report.txt

pages:
  stage: deploy
  script:
    - pipenv install --dev 
    - pipenv run sphinx-build docs/source/ public -W -b html
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_TAG

